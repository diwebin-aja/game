<script>
/**
 * Fungsi untuk manajemen perpindahan tab kategori di Beranda
 * Sesuai catatan: "setiap kali membuat kategori maka berikan form url tujuan, karena berfungsi untuk direct"
 */
function switchHomeCategory(tabName) {
    const tabs = ['mobile', 'pc', 'voucher', 'pulsa'];
    
    tabs.forEach(tab => {
        const tabBtn = document.getElementById('tab-' + tab);
        const content = document.getElementById('content-' + tab);
        
        if (tabBtn && content) {
            if (tab === tabName) {
                // Konfigurasi CSS Tailwind kita akan otomatis mendeteksi class .active
                tabBtn.className = 'prod-tab-btn active';
                content.style.display = 'grid'; 
            } else {
                tabBtn.className = 'prod-tab-btn';
                content.style.display = 'none';
            }
        }
    });

    // Menangani aksi Direct (pengalihan URL) dari attribute data-redirect-url
    const activeElement = document.getElementById('tab-' + tabName);
    if (activeElement && activeElement.hasAttribute('data-redirect-url')) {
        const targetUrl = activeElement.getAttribute('data-redirect-url');
        console.log("Kategori dialihkan ke url tujuan: " + targetUrl);
        
        // CATATAN DEVELOPER (PHP/Laravel):
        // Buka blokir sintaks di bawah ini saat diintegrasikan dengan backend 
        // untuk melakukan direct redirection sebenarnya berdasarkan form url tujuan.
        
        // window.location.href = targetUrl;
    }
}
</script>
